name: Build add-on image

on:
  push:
    branches: [main]
    paths:
      - "reachy_mini/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version from config.yaml
        id: meta
        run: |
          version=$(grep '^version:' reachy_mini/config.yaml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Add-on version: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygger reachy_mini/Dockerfile för amd64 och pushar till GHCR.
      # provenance:false → enkel image-manifest som HA Supervisor kan hämta.
      - name: Build & push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./reachy_mini
          file: ./reachy_mini/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/atterdal/amd64-reachy-mini:${{ steps.meta.outputs.version }}
            ghcr.io/atterdal/amd64-reachy-mini:latest
