name: Build add-on image

on:
  push:
    branches: [main]
    paths:
      - "reachy_mini/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygger imagen enligt reachy_mini/config.yaml (image: + version:) och
      # build.yaml (build_from), och pushar ghcr.io/atterdal/amd64-reachy-mini:<version>
      - name: Build & push amd64 add-on image
        uses: home-assistant/builder@master
        with:
          args: |
            --target reachy_mini
            --amd64
            --addon
