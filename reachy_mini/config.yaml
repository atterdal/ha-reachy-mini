name: Reachy Mini
version: "0.4.0"
slug: reachy_mini
description: Kör Reachy Mini Lite-daemonen så roboten styrs över USB direkt på HAOS-maskinen
url: https://github.com/atterdal/ha-reachy-mini/tree/main/reachy_mini
# Förbyggd image (byggs i GitHub Actions, publiceras till GHCR). Supervisor
# gör bara en docker pull — ingen kompilering på NUC:en. {arch} → amd64.
image: ghcr.io/atterdal/{arch}-reachy-mini
arch:
  - amd64
# Privilegierad hårdvaruåtkomst: en dedikerad robotlåda får se all USB
# (seriell motorstyrning, USB-ljud, ev. kamera). full_access kan INTE
# kombineras med devices/usb/uart — den ersätter dem.
full_access: true
udev: true
host_network: true
# HA:s standard-AppArmor-profil blockerar lågnivå-serieoperationer på motorerna
# (gav "Operation not permitted" trots full_access). Av på en dedikerad robotlåda.
apparmor: false
# Capabilities motorstyrningen behöver: realtidsprioritet på styrloopen (SYS_NICE)
# och raw I/O mot serieporten (SYS_RAWIO).
privileged:
  - SYS_NICE
  - SYS_RAWIO
startup: application
boot: manual
init: false
# Låter HA-verktyget nå Home Assistants kärna via Supervisor-proxyn
# (http://supervisor/core/api) med SUPERVISOR_TOKEN — för röststyrning av hemmet.
homeassistant_api: true
# Användarval: OpenAI-nyckel för röst (lämna tomt → gratis HF-röst).
options:
  openai_api_key: ""
  model_name: ""
schema:
  openai_api_key: password?
  model_name: str?
